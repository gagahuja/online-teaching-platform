<!DOCTYPE html>
<html>
<head>
    <title>Score Skill</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #eef2f3, #f9f9f9);
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .main-container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }
    </style>

</head>

<body>

<div class="navbar">
    <div><b>ScoreSkill</b></div>
    <div>
        {{ request.user.username }} |
        <a href="/logout/">Logout</a>
    </div>
</div>

<!-- ✅ ONLY ONE BLOCK -->
<div class="main-container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
