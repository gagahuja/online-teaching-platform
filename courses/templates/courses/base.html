<!DOCTYPE html>
<html>
<head>
    <title>Score Skill</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fb;
        }

        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .button {
            display: inline-block;
            padding: 8px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .button:hover {
            background-color: #2980b9;
        }

        .container {
            width: 90%;
            margin: auto;
        }   
    </style>
</head>
<body>

<div class="navbar">
    <div style="background:#2c3e50; padding:15px; color:white;">
        <b>ScoreSkill</b>

        <span style="float:right;">
            Welcome, {{ request.user.username }} |
            <a href="/logout/" style="color:white;">Logout</a>
        </span>
    </div>>
    <div>
        {% if user.is_authenticated %}
            {{ user.username }} |
            <a href="/accounts/logout/">Logout</a>
        {% endif %}
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
