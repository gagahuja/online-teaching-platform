<!DOCTYPE html>
<html>
<head>
    <title>Score Skill</title>
    <style>
    
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #eef2f3, #f9f9f9);
        }

        /* MAIN CONTAINER */
        .main-container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* NAVBAR */
        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }
        

        .container {
            padding: 30px;
            width: 90%;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .button {
            display: inline-block;
            padding: 8px 15px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .button:hover {
            background-color: #2980b9;
        }

        
    </style>
</head>
<body>

<div class="navbar">
    <div><b>ScoreSkill</b></div>
    <div>
        {{ request.user.username }} |
        <a href="/logout/">Logout</a>
    </div>
</div>

<div class="main-container">
    {% block content %}{% endblock %}
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
