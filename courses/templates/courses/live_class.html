<!DOCTYPE html>
{% extends "courses/base.html" %}

{% block content %}

<div class="container-fluid p-0">

<div class="bg-dark text-white p-2 d-flex justify-content-between">

<span>
Class: {{ session.title }}
</span>

<span>
User: {{ request.user.username }} ({{ user_role }})
</span>

</div>

<div id="jitsi-container" style="height:92vh;"></div>

</div>

<div class="container-fluid mt-2">

    <div class="row">

        <div class="col-md-9">

        <div id="jitsi-container" style="height:75vh;"></div>

        <div class="mt-3">
            <h4>👥 Live Attendance</h4>
            <ul id="attendance-list"></ul>
        </div>

    </div>

    <div class="col-md-3">

        <div id="teacher-controls" class="mb-3" style="display:none;">

        <div class="card border-danger">

        <div class="card-header bg-danger text-white">
        Teacher Controls
        </div>

        <div class="card-body">

        <button onclick="endClass()" class="btn btn-danger w-100">
        End Class For Everyone
        </button>

        </div>

        </div>

        </div>

    <div class="card">

                <div class="card-header">
                    Live Chat
                </div>
                <button onclick="raiseHand()">✋ Raise Hand</button>

                
                <div class="card-body"
                     id="chat-box"
                     style="height:300px; overflow-y:auto;">
                </div>

                <div class="card-footer">

                    <input type="text"
                           id="chat-input"
                           class="form-control"
                           placeholder="Type message...">

                    <button onclick="sendMessage()"
                            class="btn btn-primary mt-2 w-100">
                        Send
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://meet.jit.si/external_api.js"></script>

<script>

const domain = "meet.jit.si";

const options = {

roomName: "{{ meeting_name }}",

width: "100%",
height: "100%",

parentNode: document.querySelector('#jitsi-container'),

userInfo: {

displayName: "{{ request.user.username }}"

},

configOverwrite: {

startWithAudioMuted: false,

startWithVideoMuted: false,

enableWelcomePage: false,

enableClosePage: false,

disableDeepLinking: true,

prejoinPageEnabled: true

},

interfaceConfigOverwrite: {

SHOW_JITSI_WATERMARK: false,

SHOW_BRAND_WATERMARK: false,

MOBILE_APP_PROMO: false,

TOOLBAR_BUTTONS: [

'microphone',

'camera',

'closedcaptions',

'desktop',

'fullscreen',

'fodeviceselection',

'hangup',

'chat',

'recording',

'raisehand',

'tileview',

'select-background'

]

}

};

const api = new JitsiMeetExternalAPI(domain, options);

const userRole = "{{ user_role }}";

if(userRole === "teacher"){
    document.getElementById("teacher-controls").style.display = "block";
}

</script>


<script>

const sessionId = "{{ session.id }}";

const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";

const socket = new WebSocket(
    protocol + window.location.host + "/ws/classroom/" + sessionId + "/"
);

socket.onmessage = function(e) {

    const data = JSON.parse(e.data);

    console.log("WebSocket message:", data); // debug line

    const chatBox = document.getElementById("chat-box");
    const attendanceList = document.getElementById("attendance-list");

    if (!attendanceList) return;

    
    // CHAT
    if (data.type === "chat") {
        chatBox.innerHTML +=
            "<div><b>" + data.username + ":</b> " + data.message + "</div>";
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // RAISE HAND
    if (data.type === "hand") {
        chatBox.innerHTML +=
            "<div style='color:orange;'>✋ " + data.username + " raised their hand</div>";
    }

    // ATTENDANCE
    if (data.type === "attendance") {

        const attendanceList = document.getElementById("attendance-list");

        if (!attendanceList) {
            console.log("Attendance list not found");
            return;
        }

        attendanceList.innerHTML = "";

        data.users.forEach(user => {

            const li = document.createElement("li");

            if(userRole === "teacher" && user !== "{{ request.user.username }}"){

                li.innerHTML =
                "🟢 " + user +
                " <button onclick='removeStudent(\""+user+"\")' class='btn btn-sm btn-danger'>Remove</button>";

            } else {

                li.innerHTML = "🟢 " + user;

            }

            attendanceList.appendChild(li);

        });

    }

    if(data.type === "removed"){

        alert("You were removed from class by teacher");

        window.location.href = "/";

    }
    
    if (data.type === "class_end") {

            alert("Class ended by teacher");

            window.location.href = "/dashboard/";

        }

};


function sendMessage() {

    const input = document.getElementById("chat-input");

    socket.send(JSON.stringify({

        message: input.value,
        username: "{{ request.user.username }}"

    }));

    input.value = "";
}

function raiseHand() {

    socket.send(JSON.stringify({
        type: "raise_hand",
        username: "{{ request.user.username }}"
    }));

}

function endClass(){

    socket.send(JSON.stringify({
        type:"end_class"
    }));

}

function removeStudent(username){

    socket.send(JSON.stringify({

        type: "remove_student",
        username: username

    }));

}
</script>
{% endblock %}
