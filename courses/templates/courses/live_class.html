{% extends "courses/base.html" %}

{% block content %}

<div class="container-fluid p-0">

    <!-- HEADER -->
    <div class="bg-dark text-white p-2 d-flex justify-content-between">
        <span>Class: {{ session.title }}</span>
        <span>User: {{ request.user.username }} ({{ user_role }})</span>
    </div>

    <div class="row">

        <!-- VIDEO SECTION -->
        <div class="col-md-9">
            <div id="jitsi-container" style="height:75vh;"></div>

            <div class="mt-3">
                <h4>👥 Live Attendance</h4>
                <ul id="attendance-list"></ul>
            </div>
        </div>

        <!-- SIDE PANEL -->
        <div class="col-md-3">

            <!-- TEACHER CONTROLS -->
            <div id="teacher-controls" class="mb-3" style="display:none;">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">
                        Teacher Controls
                    </div>
                    <div class="card-body">
                        <button onclick="endClass()" class="btn btn-danger w-100">
                            End Class For Everyone
                        </button>
                    </div>
                </div>
            </div>

            <!-- CHAT -->
            <div class="card">

                <div class="card-header">Live Chat</div>

                <button onclick="raiseHand()" class="btn btn-warning m-2">
                    ✋ Raise Hand
                </button>

                <div class="card-body"
                     id="chat-box"
                     style="height:300px; overflow-y:auto;">
                </div>

                <div class="card-footer">

                    <input type="text"
                           id="chat-input"
                           class="form-control"
                           placeholder="Type message...">

                    <button onclick="sendMessage()"
                            class="btn btn-primary mt-2 w-100">
                        Send
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- JITSI -->
<script src="https://meet.jit.si/external_api.js"></script>

<script>

const domain = "meet.jit.si";

const roomName = "{{ meeting_name|default:'ScoreSkill_'|add:session.id }}";

const options = {
    roomName: roomName,
    width: "100%",
    height: "100%",
    parentNode: document.querySelector('#jitsi-container'),

    userInfo: {
        displayName: "{{ request.user.username }}"
    },

    configOverwrite: {
        startWithAudioMuted: false,
        startWithVideoMuted: false,
        enableWelcomePage: false,
        prejoinPageEnabled: true
    },

    interfaceConfigOverwrite: {
        SHOW_JITSI_WATERMARK: false,
        SHOW_BRAND_WATERMARK: false
    }
};

const api = new JitsiMeetExternalAPI(domain, options);

const userRole = "{{ user_role }}";

if(userRole === "teacher"){
    document.getElementById("teacher-controls").style.display = "block";
}

</script>

<!-- WEBSOCKET -->
<script>

const sessionId = "{{ session.id }}";

const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";

const socket = new WebSocket(
    protocol + window.location.host + "/ws/classroom/" + sessionId + "/"
);

socket.onmessage = function(e) {

    const data = JSON.parse(e.data);

    const chatBox = document.getElementById("chat-box");
    const attendanceList = document.getElementById("attendance-list");

    // CHAT
    if (data.type === "chat") {
        chatBox.innerHTML += `<div><b>${data.username}:</b> ${data.message}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // RAISE HAND
    if (data.type === "hand") {

        chatBox.innerHTML +=
            "<div style='color:orange;font-weight:bold;'>✋ " + data.username + " raised hand</div>";

        // highlight student
        const items = document.querySelectorAll("#attendance-list li");

        items.forEach(li => {
            if(li.innerHTML.includes(data.username)){
                li.style.backgroundColor = "#fff3cd";
            }
            });
        }
    }

    // ATTENDANCE
    if (data.type === "attendance") {

        attendanceList.innerHTML = "";

        data.users.forEach(user => {

            const li = document.createElement("li");

            if(userRole === "teacher"){

                li.innerHTML =
                "🟢 <b>" + user.username + "</b>" +
                " ⏱ Joined: " + user.join_time +
                " <button onclick='removeStudent(\""+user.username+"\")' class='btn btn-sm btn-danger'>Remove</button>";

            } else {

                li.innerHTML = "🟢 " + user.username;

            }

            attendanceList.appendChild(li);

        });

    }

    if(data.type === "removed"){
        alert("You were removed from class by teacher");
        window.location.href = "/";
    }

    if (data.type === "class_end") {
        alert("Class ended by teacher");
        window.location.href = "/dashboard/";
    }


// SEND CHAT
function sendMessage() {

    const input = document.getElementById("chat-input");

    if(input.value.trim() === "") return;

    socket.send(JSON.stringify({
        type: "chat",
        message: input.value,
        username: "{{ request.user.username }}"
    }));

    input.value = "";
}

// RAISE HAND
function raiseHand() {
    socket.send(JSON.stringify({
        type: "raise_hand",
        username: "{{ request.user.username }}"
    }));
}

// END CLASS
function endClass(){
    socket.send(JSON.stringify({
        type:"end_class"
    }));
}

// REMOVE STUDENT
function removeStudent(username){
    socket.send(JSON.stringify({
        type: "remove_student",
        username: username
    }));
}

// 🚀 AUTO LEAVE TRACKING (VERY IMPORTANT)
function sendLeaveRequest() {

    const data = JSON.stringify({
        session_id: sessionId
    });

    // Try sendBeacon first (best)
    if (navigator.sendBeacon) {
        navigator.sendBeacon("/leave-class/", data);
    } 
    else {
        // fallback for older browsers
        fetch("/leave-class/", {
            method: "POST",
            body: data,
            headers: {
                "Content-Type": "application/json"
            },
            keepalive: true
        });
    }
}

// When tab is closed or refreshed
window.addEventListener("beforeunload", sendLeaveRequest);

// When tab becomes inactive (mobile / switch apps)
document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "hidden") {
        sendLeaveRequest();
    }
});

</script>

<script>
window.addEventListener("beforeunload", function () {

    const data = new FormData();
    data.append("session_id", "{{ session.id }}");

    navigator.sendBeacon("/leave-class/", data);

});
</script>


<script>
setInterval(() => {

    const items = document.querySelectorAll("#attendance-list li");

    items.forEach(li => {

        const match = li.innerHTML.match(/Joined: (\d{2}:\d{2}:\d{2})/);

        if(match){

            const joinTime = match[1];

            const now = new Date();
            const join = new Date("1970-01-01T" + joinTime);

            const minutes = Math.floor((now - join) / 1000 / 60);

            li.innerHTML = li.innerHTML.replace(
                /⏱ Joined: .*?/,
                "⏱ " + minutes + " min"
            );
        }

    });

}, 60000);
</script>
{% endblock %}
